services:
  postgres:
    image: postgres:16-alpine
    container_name: lead-engine-db
    environment:
      POSTGRES_USER: lead_engine
      POSTGRES_PASSWORD: lead_engine
      POSTGRES_DB: lead_engine
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lead_engine"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
